name: GuardianForge CI/CD

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'backend/app/guardian/**'
      - 'backend/app/**'
      - 'backend/requirements.txt'
      - 'backend/Dockerfile'
      - '.github/workflows/guardianforge-ci-cd.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'backend/app/guardian/**'
      - 'backend/app/**'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        working-directory: ./backend
        run: |
          pip install --upgrade pip
          pip install ruff mypy pytest

      - name: Lint with Ruff
        working-directory: ./backend
        run: ruff check app/guardian/ app/ --fix

      - name: Type check with mypy
        working-directory: ./backend
        run: mypy app/guardian/ --ignore-missing-imports

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        working-directory: ./backend
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run GuardianForge tests
        working-directory: ./backend
        run: |
          pytest app/guardian/ -v --asyncio-mode=auto

      - name: Run full scan tests (optional)
        working-directory: ./backend
        run: |
          pytest app/api/endpoints/scans.py -k "guardian" -v || echo "No guardian tests yet - skipping"

  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: guardianforge:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Notify successful build
        run: echo "✅ GuardianForge build successful on main branch"

