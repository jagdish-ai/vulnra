name: 'VULNRA LLM Security Scan'
description: 'AI vulnerability scanning for LLM endpoints. Detects jailbreaks, prompt injection and data leakage.'
author: 'VULNRA'
branding:
  icon: 'shield'
  color: 'green'
inputs:
  api_key:
    description: 'AI vulnerability scanning for LLM endpoints. Detects jailbreaks, prompt injection and data leakage.'
    required: true
  target_url:
    description: 'AI vulnerability scanning for LLM endpoints. Detects jailbreaks, prompt injection and data leakage.'
    required: true
  tier:
    description: 'AI vulnerability scanning for LLM endpoints. Detects jailbreaks, prompt injection and data leakage.'
    required: false
    default: 'free'
  scan_engine:
    description: 'AI vulnerability scanning for LLM endpoints. Detects jailbreaks, prompt injection and data leakage.'
    required: false
    default: 'crescendo'
  fail_on_risk_score:
    description: 'AI vulnerability scanning for LLM endpoints. Detects jailbreaks, prompt injection and data leakage.'
    required: false
    default: '70'
  vulnra_api_url:
    description: 'AI vulnerability scanning for LLM endpoints. Detects jailbreaks, prompt injection and data leakage.'
    required: false
    default: 'https://vulnra.ai'
outputs:
  risk_score:
    description: 'AI vulnerability scanning for LLM endpoints. Detects jailbreaks, prompt injection and data leakage.'
  scan_id:
    description: 'AI vulnerability scanning for LLM endpoints. Detects jailbreaks, prompt injection and data leakage.'
  findings_count:
    description: 'AI vulnerability scanning for LLM endpoints. Detects jailbreaks, prompt injection and data leakage.'
runs:
  using: 'node20'
  main: 'github-action/dist/index.js'
